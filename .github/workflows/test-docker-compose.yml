name: Test Docker Compose

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      DB_DATABASE: app_test
      DB_USERNAME: testuser
      DB_PASSWORD: testpass123
      DB_ROOT_PASSWORD: testrootpass123
      DB_CONNECTION: mysql
      DB_HOST: db-mysql
      DB_PORT: 3306
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: testpass123
      RATE_LIMIT_ENABLED: "false"
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      LOG_LEVEL: debug
      LOG_FORMAT: console
      STACK_NAME: app
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Generate secrets
        id: secrets
        run: |
          echo "APP_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')" >> $GITHUB_OUTPUT
          echo "JWT_SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')" >> $GITHUB_OUTPUT
      
      - name: Create .env for tests
        run: |
          cp .env.example .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${{ env.DB_DATABASE }}|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${{ env.DB_USERNAME }}|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ env.DB_PASSWORD }}|" .env
          sed -i "s|^DB_ROOT_PASSWORD=.*|DB_ROOT_PASSWORD=${{ env.DB_ROOT_PASSWORD }}|" .env
          sed -i "s|^APP_KEY=.*|APP_KEY=${{ steps.secrets.outputs.APP_KEY }}|" .env
          sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${{ steps.secrets.outputs.JWT_SECRET_KEY }}|" .env
          sed -i "s|^FIRST_SUPERUSER_PASSWORD=.*|FIRST_SUPERUSER_PASSWORD=${{ env.FIRST_SUPERUSER_PASSWORD }}|" .env
          sed -i "s|^APP_ENV=.*|APP_ENV=${{ env.APP_ENV }}|" .env
          sed -i "s|^APP_DEBUG=.*|APP_DEBUG=${{ env.APP_DEBUG }}|" .env
          sed -i "s|^APP_URL=.*|APP_URL=${{ env.APP_URL }}|" .env
          sed -i "s|^FRONTEND_URL=.*|FRONTEND_URL=${{ env.FRONTEND_URL }}|" .env
          sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${{ env.CORS_ORIGINS }}|" .env
      
      - name: Verify .env file
        run: |
          echo "=== .env file exists ==="
          ls -la .env
          echo "=== .env file contents (first 30 lines) ==="
          cat .env | head -30
          echo "=== Check docker compose configuration ==="
          docker compose -f docker/compose.base.yml -f docker/compose.dev.yml config --services
      
      - name: Build Docker images
        run: |
          docker compose \
            -f docker/compose.base.yml \
            -f docker/compose.dev.yml \
            --profile mysql \
            --project-directory . \
            build backend frontend
      
      - name: Start services
        run: |
          docker compose \
            -f docker/compose.base.yml \
            -f docker/compose.dev.yml \
            --profile mysql \
            --project-directory . \
            up -d backend frontend db-mysql
      
      - name: Check container status
        run: |
          echo "=== All containers status ==="
          docker compose -f docker/compose.base.yml -f docker/compose.dev.yml --profile mysql ps
          echo ""
          echo "=== MySQL container logs (last 30 lines) ==="
          docker logs docker-db-mysql-1 --tail 30 || true
      
      - name: Wait for MySQL to be healthy
        run: |
          echo "Waiting for MySQL to be healthy..."
          for i in {1..60}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' docker-db-mysql-1 2>/dev/null || echo "starting")
            echo "Attempt $i/60: MySQL status = $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "âś… MySQL is healthy!"
              exit 0
            fi
            sleep 2
          done
          echo "âťŚ MySQL failed to become healthy"
          docker logs docker-db-mysql-1 --tail 50
          exit 1
      
      - name: Test backend is up
        run: |
          echo "Testing backend health check..."
          curl --retry 10 --retry-delay 5 --retry-connrefused \
            --fail-with-body \
            http://localhost:8000/api/v1/utils/health-check
      
      - name: Test frontend is up
        run: |
          echo "Testing frontend..."
          curl --retry 10 --retry-delay 5 --retry-connrefused \
            --fail-with-body \
            http://localhost:3000
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker logs docker-backend-1 --tail 50 || true
          echo ""
          echo "=== Frontend logs ==="
          docker logs docker-frontend-1 --tail 50 || true
          echo ""
          echo "=== Prestart logs ==="
          docker logs docker-prestart-1 --tail 50 || true
      
      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f docker/compose.base.yml \
            -f docker/compose.dev.yml \
            --profile mysql \
            --project-directory . \
            down -v --remove-orphans
