name: Test Docker Compose

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Create .env for tests
        run: |
          cp .env.example .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=app_test|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=testuser|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=testpass123|" .env
          sed -i "s|^DB_ROOT_PASSWORD=.*|DB_ROOT_PASSWORD=testrootpass123|" .env
          sed -i "s|^APP_KEY=.*|APP_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')|" .env
          sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')|" .env
          sed -i "s|^FIRST_SUPERUSER_PASSWORD=.*|FIRST_SUPERUSER_PASSWORD=testpass123|" .env
          sed -i "s|^APP_ENV=.*|APP_ENV=local|" .env
          sed -i "s|^APP_DEBUG=.*|APP_DEBUG=true|" .env
          sed -i "s|^APP_URL=.*|APP_URL=http://localhost:8000|" .env
          sed -i "s|^FRONTEND_URL=.*|FRONTEND_URL=http://localhost:3000|" .env
          sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=http://localhost:3000|" .env
      
      - name: Verify .env file
        run: |
          echo "=== .env file exists ==="
          ls -la .env
          echo "=== .env file contents ==="
          cat .env | head -25
          echo "=== Test docker compose env ==="
          docker compose -f docker/compose.base.yml -f docker/compose.dev.yml --env-file .env config --services
      
      - name: Build Docker images
        run: docker compose -f docker/compose.base.yml -f docker/compose.dev.yml --env-file .env --profile mysql build backend frontend
      
      - name: Start services
        run: docker compose -f docker/compose.base.yml -f docker/compose.dev.yml --env-file .env --profile mysql up -d --wait backend frontend
      
      - name: Test backend is up
        run: curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:8000/api/v1/utils/health-check
      
      - name: Test frontend is up
        run: curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:3000
      
      - name: Cleanup
        if: always()
        run: docker compose -f docker/compose.base.yml -f docker/compose.dev.yml --profile mysql down -v --remove-orphans
